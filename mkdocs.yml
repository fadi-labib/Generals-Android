# GeneralsX @docs FadiLabib 07/07/2026 - MkDocs Material site with a curated reader
# journey (Play -> Build -> Porting deep-dives -> Reference -> Dev blog). Internal
# working documents (docs/WORKDIR, docs/superpowers) are repo-only: excluded from the
# site, linked from public pages via absolute GitHub URLs. Built and deployed by
# .github/workflows/docs-pages.yml with --strict (broken internal links fail CI).
site_name: Generals Zero Hour on Android
site_description: C&C Generals Zero Hour running natively on Android — Vulkan (Turnip + DXVK), SDL3, OpenAL
site_url: https://fadi-labib.github.io/Generals-Android/
repo_url: https://github.com/fadi-labib/Generals-Android
repo_name: fadi-labib/Generals-Android
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - tables

# Internal working docs stay in the repo but off the public site.
exclude_docs: |
  WORKDIR/
  superpowers/

# Nav-title convention: entries marked "(upstream)" are inherited from the parent
# project lineage (ammaarreshi / fbraz3) and are kept textually unmodified here so
# syncing from upstream stays conflict-free — the tag lives ONLY in this nav title.
nav:
  - Home: index.md
  - FAQ: FAQ.md
  - Play:
      - Get the game files (upstream): HOWTO/GETTING_THE_GAME_FILES.md
      - Installation (upstream): HOWTO/INSTALLATION.md
      - Known issues (upstream): KNOWN_ISSUES/README.md
  - Build:
      - Android: BUILD/ANDROID.md
      - macOS (upstream): BUILD/MACOS.md
      - Linux (upstream): BUILD/LINUX.md
  - Porting deep-dives:
      - Porting playbook, iOS (upstream): port/PORTING_PLAYBOOK.md
      - Porting patterns (upstream): port/PORTING_PATTERNS.md
      - Touch controls: port/TOUCH_CONTROLS.md
      - Release checklist (upstream): port/RELEASE_CHECKLIST.md
  - Reference:
      - Command-line parameters (upstream): ETC/COMMAND_LINE_PARAMETERS.md
      - SagePatch (upstream): PATCHES/SAGEPATCH.md
      - SagePatch configuration (upstream): HOWTO/SAGEPATCH_CONFIGURATION.md
      - Russian localization (upstream): HOWTO/RUSSIAN_LOCALIZATION.md
      - HOWTO index (upstream): HOWTO/README.md
      - 'Archive: Linux graphics phase 1 (upstream)': ETC/archive/PHASE01_LINUX_GRAPHICS.md
  - Dev blog:
      - 2026-07: DEV_BLOG/2026-07-DIARY.md
      - 2026-06 (upstream): DEV_BLOG/2026-06-DIARY.md
      - 2026-05 (upstream): DEV_BLOG/2026-05-DIARY.md
      - 2026-04 (upstream): DEV_BLOG/2026-04-DIARY.md
      - 2026-03 (upstream): DEV_BLOG/2026-03-DIARY.md
      - 2026-02 (upstream): DEV_BLOG/2026-02-DIARY.md
